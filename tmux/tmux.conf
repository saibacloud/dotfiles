# =============
# Tmux Config
# =============

# Better prefix (Ctrl+A instead of Ctrl+B)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Vi mode for copy
setw -g mode-keys vi

# Mouse support
set -g mouse on

# Split panes with | and -  (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Alt+hjkl
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Quick reload
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Increase history
set -g history-limit 50000

# Reduce escape time (important for vi mode in nvim)
set -sg escape-time 10

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Status bar
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left '#[fg=#89b4fa,bold] #S '
set -g status-right '#[fg=#a6adc8] %H:%M  %d-%b'
set -g status-left-length 30

# Active window
setw -g window-status-current-format '#[fg=#89b4fa,bold] #I:#W '
setw -g window-status-format '#[fg=#6c7086] #I:#W '

# Vi copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi r send-keys -X rectangle-toggle
